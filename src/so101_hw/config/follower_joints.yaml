# Per-servo Feetech parameters for the SO-101 follower — OVERRIDE-ONLY EXAMPLE.
#
# NOT applied by default. so101_hw.urdf.xacro sets joint_config_file="" so the
# driver does NOT load this file, and the on-servo EEPROM calibration written by
# LeRobot (`lerobot-calibrate`) stays the source of truth.
#
# The homing_offset / range_min / range_max values below are the UPSTREAM author's
# arm (legalaspro/so101-ros-physical-ai) and would MIS-CENTER and range-clip a
# different unit. The driver WRITES these back into the motors on startup, so
# pointing joint_config_file here would OVERWRITE this arm's LeRobot calibration.
#
# Only use this file (set the joint_config_file arg to its path) if you
# deliberately want to force specific per-servo values for THIS arm — in which
# case replace the numbers below with this arm's calibration first. The gripper
# (id 6) block also carries torque/current protection limits, which LeRobot does
# not produce.
joints:
  shoulder_pan:
    id: 1
    homing_offset: 530
    range_min: 866
    range_max: 3231
    p_coefficient: 16 # may be original 16 is too much, set 12
    i_coefficient: 0
    d_coefficient: 32
    return_delay_time: 0
    acceleration: 254

  shoulder_lift:
    id: 2
    homing_offset: -369
    range_min: 896
    range_max: 3211
    p_coefficient: 16
    i_coefficient: 0
    d_coefficient: 32
    return_delay_time: 0
    acceleration: 254

  elbow_flex:
    id: 3
    homing_offset: -98
    range_min: 866
    range_max: 3066
    p_coefficient: 16
    i_coefficient: 0
    d_coefficient: 32
    return_delay_time: 0
    acceleration: 254

  wrist_flex:
    id: 4
    homing_offset: 725
    range_min: 1039
    range_max: 3121
    p_coefficient: 16
    i_coefficient: 0
    d_coefficient: 32
    return_delay_time: 0
    acceleration: 254

  wrist_roll:
    id: 5
    homing_offset: 1704
    range_min: 123
    range_max: 3955
    p_coefficient: 16
    i_coefficient: 0
    d_coefficient: 32
    return_delay_time: 0
    acceleration: 254

  gripper:
    id: 6
    homing_offset: 1573
    range_min: 2027
    range_max: 3483
    p_coefficient: 16
    i_coefficient: 0
    d_coefficient: 32
    return_delay_time: 0
    acceleration: 254
    max_torque_limit: 500
    protection_current: 250
    overload_torque: 25
