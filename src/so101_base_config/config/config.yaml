###############################################################
#
#  MoveIt Pro base (mock hardware) configuration for the SO-101 arm.
#
###############################################################

# Baseline hardware configuration.
# [Required]
hardware:
  # Mock hardware for this base config. The physical config overrides this.
  simulated: true

  # Let the MoveIt Pro Agent launch the ros2_control node and robot_state_publisher.
  launch_control_node: True
  launch_robot_state_publisher: True

  # URDF (wrapper xacro) and SRDF.
  # [Required]
  robot_description:
    urdf:
      package: "so101_base_config"
      path: "description/so101.urdf.xacro"
    srdf:
      package: "so101_base_config"
      path: "config/moveit/so101.srdf"
    # Passed through to the wrapper xacro. `mock` selects mock_components/GenericSystem.
    urdf_params:
      - hardware_type: "mock"

# ROS global params for launch.
# [Optional]
ros_global_params:
  use_sim_time: False

# MoveIt configuration.
# [Required]
moveit_params:
  # Used by the Waypoint Manager to save joint states from this joint group.
  joint_group_name: "manipulator"

  kinematics:
    package: "so101_base_config"
    path: "config/moveit/kinematics.yaml"
  sensors_3d:
    package: "so101_base_config"
    path: "config/moveit/sensors_3d.yaml"
  joint_limits:
    package: "so101_base_config"
    path: "config/moveit/joint_limits.yaml"
  pose_jog:
    package: "so101_base_config"
    path: "config/moveit/pose_jog.yaml"
  joint_jog:
    package: "so101_base_config"
    path: "config/moveit/joint_jog.yaml"

  publish:
    planning_scene: True
    geometry_updates: True
    state_updates: True
    transforms_updates: True

  trajectory_execution:
    manage_controllers: True
    allowed_execution_duration_scaling: 2.0
    allowed_goal_duration_margin: 5.0
    allowed_start_tolerance: 0.01

# ros2_control process configuration.
# [Required]
ros2_control:
  config:
    package: "so101_base_config"
    path: "config/control/so101.ros2_control.yaml"
  controllers_active_at_startup:
    - "joint_state_broadcaster"
    - "joint_trajectory_admittance_controller"
    - "gripper_controller"
  controllers_inactive_at_startup:
    - "joint_velocity_controller"
    - "velocity_force_controller"
  controllers_not_managed: []
  controller_shared_topics: []

# Behaviors and objectives.
# [Required]
objectives:
  behavior_loader_plugins:
    core:
      - "moveit_pro::behaviors::CoreBehaviorsLoader"
      - "moveit_pro::behaviors::MTCCoreBehaviorsLoader"
      - "moveit_pro::behaviors::VisionBehaviorsLoader"
      - "moveit_pro::behaviors::ConverterBehaviorsLoader"
  objective_library_paths:
    core_objectives:
      package_name: "moveit_pro_objectives"
      relative_path: "objectives/core"
    motion_objectives:
      package_name: "moveit_pro_objectives"
      relative_path: "objectives/motion"
    perception_objectives:
      package_name: "moveit_pro_objectives"
      relative_path: "objectives/perception"
    so101_objectives:
      package_name: "so101_base_config"
      relative_path: "objectives"
  waypoints_file:
    package_name: "so101_base_config"
    relative_path: "waypoints/waypoints.yaml"
